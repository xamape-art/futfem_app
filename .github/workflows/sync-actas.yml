name: Sync Actas FCF · FUTFEM

on:
  # Automático: cada lunes 10:00 UTC
  schedule:
    - cron: '0 10 * * 1'

  # Manual: control total para backfills o tests
  workflow_dispatch:
    inputs:
      league:
        description: 'FCF group_path de la liga (obligatorio)'
        required: true
        default: 'futbol-femeni/tercera-federacio-futbol-femeni/grup-v'
        type: string
      season:
        description: 'Código temporada FCF'
        required: true
        default: '2627'
        type: choice
        options:
          - '2627'
          - '2526'
      force:
        description: 'Reimportar actas ya procesadas'
        default: false
        type: boolean
      dry_run:
        description: 'Solo parsear, no escribir en Supabase'
        default: false
        type: boolean

jobs:
  # ─── PROGRAMADO: todas las ligas activas del matrix ─────────────────────────
  sync-scheduled:
    if: github.event_name == 'schedule'
    name: "Sync ${{ matrix.league }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false  # Si una liga falla, las otras siguen
      matrix:
        # ← Añadir aquí nuevas ligas (group_path) cuando se activen
        league:
          - 'futbol-femeni/tercera-federacio-futbol-femeni/grup-v'
          - 'futbol-femeni/preferent-femeni/grup-1'
          - 'futbol-femeni/primera-divisio-femeni/grup-1'
          - 'futbol-femeni/primera-divisio-femeni/grup-2'
          - 'futbol-femeni/preferent-femeni-juvenil/grup-1'
          - 'futbol-femeni/primera-divisio-femeni-juvenil/grup-1'
          - 'futbol-femeni/primera-divisio-femeni-juvenil/grup-2'
          - 'futbol-femeni/primera-divisio-femeni-juvenil/grup-3'
        season:
          - '2627'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: |
          node scripts/sync-actas.js \
            --league "${{ matrix.league }}" \
            --season "${{ matrix.season }}"
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Step summary
        if: always()
        run: |
          echo "## Sync Actas · FUTFEM_APP" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Liga** | ${{ matrix.league }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Season** | ${{ matrix.season }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY

  # ─── MANUAL: liga + temporada específica ─────────────────────────────────────
  sync-manual:
    if: github.event_name == 'workflow_dispatch'
    name: "Manual Sync · ${{ inputs.league }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: |
          FLAGS="--league ${{ inputs.league }} --season ${{ inputs.season }}"
          if [ "${{ inputs.force }}"   = "true" ]; then FLAGS="$FLAGS --force";   fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          echo "▶ node scripts/sync-actas.js $FLAGS"
          node scripts/sync-actas.js $FLAGS
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Step summary
        if: always()
        run: |
          echo "## Manual Sync · FUTFEM_APP" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Liga** | ${{ inputs.league }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Season** | ${{ inputs.season }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Force** | ${{ inputs.force }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry run** | ${{ inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
