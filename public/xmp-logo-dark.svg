<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Línea decorativa superior izquierda (acento, evoca línea de campo) -->
  <line x1="120" y1="55" x2="180" y2="55" stroke="#D67D2E" stroke-width="3" stroke-linecap="square"/>
  
  <!-- XMP - tipografía geométrica fuerte -->
  <text x="300" y="140" 
        font-family="Helvetica, Arial, sans-serif" 
        font-weight="900" 
        font-size="110" 
        letter-spacing="-4"
        text-anchor="middle"
        fill="#FFFFFF">XMP</text>
  
  <!-- Línea separadora central -->
  <line x1="220" y1="165" x2="380" y2="165" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square"/>
  
  <!-- FOOTBALL ANALYSIS -->
  <text x="300" y="200" 
        font-family="Helvetica, Arial, sans-serif" 
        font-weight="500" 
        font-size="18" 
        letter-spacing="8"
        text-anchor="middle"
        fill="#FFFFFF">FOOTBALL ANALYSIS</text>
  
  <!-- Línea acento inferior derecha (asimetría intencional, cierra composición) -->
  <line x1="420" y1="225" x2="480" y2="225" stroke="#D67D2E" stroke-width="3" stroke-linecap="square"/>
</svg>